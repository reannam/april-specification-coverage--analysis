name: Tests and lint

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/Backend/requirements.txt
      - run: python -m pip install -r Backend/requirements.txt
      - run: ruff check Backend tests
      - run: black --check Backend tests
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/Frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
